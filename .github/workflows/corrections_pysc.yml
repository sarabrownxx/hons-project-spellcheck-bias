name: Corrections — Pyspellchecker

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: 'Run ID of the main pipeline to download the enriched parquet from'
        required: true
        type: string
      hunspell_run_id:
        description: 'Run ID of the Corrections — Hunspell workflow to download chunk JSONs from'
        required: true
        type: string

jobs:
  pysc-corrections:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - run: mkdir -p data logs

      - name: Download enriched dataset from main pipeline
        uses: actions/download-artifact@v4
        with:
          name: names-enriched-${{ inputs.source_run_id }}
          path: .
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.source_run_id }}

      - name: Download hunspell chunk 0
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: hunspell-chunk-0-${{ inputs.hunspell_run_id }}
          path: data/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.hunspell_run_id }}

      - name: Download hunspell chunk 1
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: hunspell-chunk-1-${{ inputs.hunspell_run_id }}
          path: data/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.hunspell_run_id }}

      - name: Run pyspellchecker corrections (+ merge hunspell chunks)
        run: python scripts/corrections_names.py --mode pysc --total-chunks 2

      - name: Upload final dataset
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: names-advanced-${{ github.run_id }}
          path: data/advanced_results_base.parquet
          retention-days: 90

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: correction-pysc-logs-${{ github.run_id }}
          path: logs/
          retention-days: 90
