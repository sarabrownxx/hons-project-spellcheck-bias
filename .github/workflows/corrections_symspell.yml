name: Corrections — SymSpell

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: 'Run ID of the main pipeline (names-enriched artifact)'
        required: true
        type: string
      hunspell_run_id:
        description: 'Run ID of the Corrections — Hunspell workflow (chunk JSON artifacts)'
        required: true
        type: string

jobs:
  symspell-corrections:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - run: mkdir -p data logs

      - name: Download enriched dataset from main pipeline
        uses: actions/download-artifact@v4
        with:
          name: names-enriched-${{ inputs.source_run_id }}
          path: data/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.source_run_id }}

      - name: Download hunspell chunk 0
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: hunspell-chunk-0-${{ inputs.hunspell_run_id }}
          path: data/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.hunspell_run_id }}

      - name: Download hunspell chunk 1
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: hunspell-chunk-1-${{ inputs.hunspell_run_id }}
          path: data/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.hunspell_run_id }}

      - name: Run hunspell merge + SymSpell corrections
        run: python scripts/corrections_symspell.py --hunspell-chunks 2 --workers 2

      - name: Upload intermediate dataset
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: names-intermediate-${{ github.run_id }}
          path: data/names_results_base.parquet
          retention-days: 90

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-symspell-${{ github.run_id }}
          path: logs/
          retention-days: 90
