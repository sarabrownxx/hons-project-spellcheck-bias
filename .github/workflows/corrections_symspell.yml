name: Corrections — SymSpell

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: 'Run ID of the main pipeline (names-enriched artifact)'
        required: true
        type: string

jobs:
  symspell-corrections:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - run: mkdir -p data logs

      - name: Download enriched dataset from main pipeline
        uses: actions/download-artifact@v4
        with:
          name: names-enriched-${{ inputs.source_run_id }}
          path: .
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.source_run_id }}

      - name: Run SymSpell corrections
        run: python scripts/corrections_symspell.py --workers 2

      - name: Upload symspell results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: names-symspell-${{ github.run_id }}
          path: data/symspell_results.parquet
          retention-days: 90

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-symspell-${{ github.run_id }}
          path: logs/
          retention-days: 90
